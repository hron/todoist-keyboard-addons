name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          zip -r "todoist-keyboard-addons-${{ github.ref_name }}.zip" \
            manifest.json \
            content.js \
            options.js \
            options.html \
            docs/screenshot-parent-label.png

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "todoist-keyboard-addons-${{ github.ref_name }}.zip"
          generate_release_notes: true
